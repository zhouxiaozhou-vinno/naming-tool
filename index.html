<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VINNO 命名评估系统</title>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <style>
    :root {
      --primary: #0a1628; --primary-light: #13233f; --accent: #1e3a5f;
      --gold: #c9a74b; --bg: #f0f2f5; --card-bg: #ffffff;
      --text: #1e293b; --border: #e2e8f0; --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --radius: 20px; --radius-sm: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); line-height:1.6; padding:20px; }
    .container { max-width:1120px; margin:0 auto; }
    .header { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color:white; padding:36px; border-radius:24px; margin-bottom:24px; text-align:center; box-shadow:0 12px 40px rgba(0,0,0,0.1); }
    .card { background:var(--card-bg); border-radius:var(--radius); padding:32px 36px; margin-bottom:20px; box-shadow:var(--shadow); border:1px solid var(--border); }
    h2 { font-size:22px; margin-bottom:18px; color:var(--primary); }
    h3 { font-size:18px; margin:16px 0 10px; color:var(--accent); }
    label { display:block; font-weight:600; margin:12px 0 4px; }
    input, textarea, select { width:100%; padding:12px; border:1px solid var(--border); border-radius:10px; font-size:15px; margin-bottom:12px; background:white; }
    .btn { padding:12px 24px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:600; cursor:pointer; font-size:15px; display:inline-flex; align-items:center; gap:8px; }
    .btn.gold { background:var(--gold); color:#000; }
    .btn.ai { background:#7c3aed; }
    .btn.outline { background:white; color:var(--accent); border:2px solid var(--accent); }
    .btn.danger { background:#e74c3c; }
    .btn.sm { padding:4px 10px; font-size:12px; }
    .hidden { display:none !important; }
    .chip { background:#eef2ff; padding:6px 16px; border-radius:20px; display:inline-block; margin:4px; font-size:14px; }
    .matrix-wrap { overflow-x:auto; border-radius:12px; border:1px solid var(--border); }
    table { width:100%; border-collapse:collapse; font-size:13px; min-width:800px; }
    th { background:var(--primary); color:white; padding:10px 6px; font-weight:600; }
    td { border:1px solid var(--border); padding:10px 6px; text-align:center; background:white; }
    .name-cell { text-align:left; font-weight:600; background:#f8fafc; padding-left:16px !important; }
    th:first-child, td.name-cell { position:sticky; left:0; z-index:2; }
    th:first-child { z-index:3; background:var(--primary); }
    td.name-cell { background:#f8fafc; }
    select.score-select { width:64px; padding:6px; border-radius:6px; text-align:center; }
    .live-scores { display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; }
    .live-card { background:#f8fafc; border-radius:12px; padding:16px; text-align:center; flex:1 1 120px; border:2px solid transparent; }
    .live-card.leader { border-color:var(--gold); background:#fffbf0; }
    .live-card .score { font-size:28px; font-weight:800; color:var(--accent); }
    .option-group { display:flex; flex-wrap:wrap; align-items:center; gap:6px 12px; margin-bottom:10px; }
    .option-group strong { margin-right:8px; }
    .option-group label { display:inline-flex; align-items:center; margin:0; font-weight:400; cursor:pointer; white-space:nowrap; }
    .option-group input[type="checkbox"] { margin-right:4px; cursor:pointer; }
    .library-box { border:1px solid var(--border); border-radius:12px; padding:16px; margin:12px 0; background:#fafbfc; }
    .inline-add { display:flex; gap:8px; align-items:center; }
    .inline-add input { flex:1; }
    .candidate-row, .dim-row { display:flex; gap:8px; margin-bottom:10px; align-items:center; }
    .candidate-row input, .dim-row input { flex:1; }
    .delete-btn { background:#e74c3c; color:white; border:none; border-radius:6px; padding:2px 8px; cursor:pointer; }
    .skip-candidates-label { display:flex !important; align-items:center !important; gap:8px !important; margin-top:12px !important; }
    .skip-candidates-label input[type="checkbox"] { width:auto !important; margin:0 !important; }
    .report-box { background:#f8fafc; border:1px solid var(--border); border-radius:12px; padding:20px; margin-top:10px; }
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
  const ADMIN_PASSWORD = "admin123";
  // 四个核心密钥（已替换为用户提供的实际值）
  const EMAILJS_PUBLIC_KEY = "SGWZZKBDK9xhn2jjo";
  const EMAILJS_SERVICE_ID = "service_lys1uko";
  const EMAILJS_TEMPLATE_ID = "template_0312enu";
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeRYk3x6RhwIC-cbEMdecMuI8Hub1P-PxTD-y0LUxE652X0aH5DDv8Yq_5e5Re3wM5/exec";
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRxYkXUWwopxpvAudeB4AWQd462dI7Xb2PIhJxXQ281AXX1RHKuGUXxkaUClYZhcL5Y6r_T_AB-HhnZ/pub?output=csv";

  // 默认配置（包含中英文双字段）
  const defaultConfig = {
    productLine: "Azolla",
    valueProp: "床旁诊断的指引者，医生的合作伙伴",
    valuePropEn: "The Guide at the Point of Care — a partner, not just a tool",
    marketPos: "与V系列并行，逐步替代V系列高中端便携产品。高端对标迈瑞M9~M11，中端对标MX3~MX6。",
    marketPosEn: "Parallel to V series, gradually replacing high/mid-range V series portable systems. High-end benchmark: Mindray M9~M11; mid-range: MX3~MX6.",
    namingImagery: "指引（导航 & 光）、效率（智能）、助手（人性化）。需支持Pro/Lite/Plus等扩展。",
    namingImageryEn: "Guidance (navigation & light), Efficiency (intelligence), Assistance (human-centric). Must support future series expansion (Pro/Lite/Plus).",
    competitors: "Lumify, Vivid, Acuson, M9",
    candidates: [
      { name: "Navos", chinese: "奈沃斯", ipa: "/ˈnævɒs/", logic: "Nav+os，导航系统", logicEn: "Nav+os, navigation system" },
      { name: "Cynos", chinese: "赛诺斯", ipa: "/ˈsaɪnɒs/", logic: "源自北极星，保留指引意", logicEn: "Derived from Cynosure (Polaris), guidance" },
      { name: "Toris", chinese: "托瑞斯", ipa: "/ˈtɔː.rɪs/", logic: "Tower of light，高塔之光", logicEn: "Tower of light, beacon" },
      { name: "Navix", chinese: "纳维克斯", ipa: "/ˈnæv.ɪks/", logic: "拉丁语 navis，超声诊断导航", logicEn: "Latin navis (ship/navigate), diagnostic navigation" },
      { name: "Lumis", chinese: "鲁米斯", ipa: "/ˈluː.mɪs/", logic: "Lumen+is，光之所至，诊断即明", logicEn: "Lumen+is, where light reaches, diagnosis becomes clear" }
    ],
    dimensions: [
      { name: "战略匹配度", weight: 20 }, { name: "记忆度", weight: 15 },
      { name: "发音友好度", weight: 15 }, { name: "视觉美观度", weight: 10 },
      { name: "语义联想", weight: 15 }, { name: "品牌一致性", weight: 10 },
      { name: "延展性", weight: 10 }, { name: "风险控制", weight: 5 }
    ],
    modelRule: {
      rulePatterns: ["命名+数字+后缀"],
      digits: ["70","60","50","30"],
      suffixes: ["Pro","Elite","Plus","C","W"],
      funcLetters: [],
      customRuleText: "",
      recommendedCombos: ["Azolla 70 Pro"]
    },
    teamOptions: ["研发","国内市场战略部","国内市场运营部","国际市场部","国际临床应用部","销售","区域/国家代理商","其他"],
    projectId: "default"
  };

  let config = JSON.parse(localStorage.getItem('namingConfig')) || JSON.parse(JSON.stringify(defaultConfig));
  if (!config.projectId || config.projectId === 'default') {
    config.projectId = 'project_' + Date.now();
    saveConfig();
  }
  function saveConfig() { localStorage.setItem('namingConfig', JSON.stringify(config)); }

  const digitGroups = {
    ones:   { label: "个位数", values: ["1","2","3","4","5","6","7","8","9"] },
    tens:   { label: "整十位", values: ["10","20","30","40","50","60","70","80","90"] },
    hundreds:{ label: "整百位", values: ["100","200","300","400","500","600","700","800","900"] },
    thousands:{ label: "整千位", values: ["1000","2000","3000","4000","5000","6000","7000","8000","9000"] }
  };
  const suffixPool = ["Pro","Exp","Super","Elite","Max","Plus","Premium","Ultra","Platinum","Optimum","Turbo"];
  const letterPool = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');

  const teamTrans = {
    "研发": "R&D", "国内市场战略部": "Domestic Market Strategy", "国内市场运营部": "Domestic Market Operations",
    "国际市场部": "International Market", "国际临床应用部": "International Clinical Applications",
    "销售": "Sales", "区域/国家代理商": "Regional/Country Distributor", "其他": "Other"
  };
  const dimTrans = {
    "战略匹配度": "Strategic Fit", "记忆度": "Memorability", "发音友好度": "Pronunciation",
    "视觉美观度": "Visual Appeal", "语义联想": "Semantic Association", "品牌一致性": "Brand Consistency",
    "延展性": "Extendibility", "风险控制": "Risk Control"
  };
  const patTrans = {
    "命名+数字+后缀": "Name+Digit+Suffix", "命名+数字": "Name+Digit", "命名+后缀": "Name+Suffix",
    "命名+数字+功能字母": "Name+Digit+FuncLetter", "命名+功能字母": "Name+FuncLetter",
    "命名+功能字母+后缀": "Name+FuncLetter+Suffix", "命名": "Name"
  };

  window.onload = () => {
    const p = new URLSearchParams(location.search);
    const cfg = p.get('config');
    if (cfg) {
      let jsonStr;
      try {
        const binaryStr = atob(cfg);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
        jsonStr = pako.inflate(bytes, { to: 'string' });
      } catch (e) {
        jsonStr = decodeURIComponent(cfg);
      }
      loadSurveyMode(jsonStr, p.get('lang')||'zh');
    } else {
      renderLogin();
    }
  };

  function renderLogin() {
    document.getElementById('app').innerHTML = `<div class="card" style="max-width:400px; margin:80px auto;"><div class="header"><h1>🔐 管理员登录</h1></div><input type="password" id="adminPass" placeholder="管理密码"><button class="btn" onclick="doLogin()">登录</button><p id="loginError" style="color:#e74c3c;"></p></div>`;
    document.getElementById('adminPass').addEventListener('keypress', e => { if(e.key==='Enter') doLogin(); });
  }
  function doLogin() { if(document.getElementById('adminPass').value === ADMIN_PASSWORD) renderAdmin(); else document.getElementById('loginError').textContent = '密码错误'; }

  // ==================== 管理面板（包含 CEO 报告生成器） ====================
  function renderAdmin() {
    const allPatterns = ["命名+数字+后缀","命名+数字","命名+后缀","命名+数字+功能字母","命名+功能字母","命名+功能字母+后缀","命名"];
    const allChecked = allPatterns.every(p => config.modelRule.rulePatterns.includes(p));
    document.getElementById('app').innerHTML = `
      <div class="header"><h1>⚙️ VINNO 命名评估系统</h1></div>
      <div class="card"><h2>📋 产品基本信息</h2>
        <label>产品线名称</label><input id="productLine" value="${config.productLine}">
        <label>价值主张（中文）</label><input id="valueProp" value="${config.valueProp}">
        <label>价值主张 Value Proposition (English) [可选]</label><input id="valuePropEn" value="${config.valuePropEn||''}" placeholder="留空则英文问卷显示中文原文">
        <label>市场定位（中文）</label><textarea id="marketPos">${config.marketPos}</textarea>
        <label>市场定位 Market Positioning (English) [可选]</label><textarea id="marketPosEn">${config.marketPosEn||''}</textarea>
        <label>命名意象（中文）</label><textarea id="namingImagery">${config.namingImagery}</textarea>
        <label>命名意象 Naming Imagery (English) [可选]</label><textarea id="namingImageryEn">${config.namingImageryEn||''}</textarea>
        <label>竞品参考</label><input id="competitors" value="${config.competitors}">
        <label>项目 ID（自动生成，用于数据隔离）</label><input id="projectId" value="${config.projectId}" readonly style="background:#f1f5f9;">
      </div>
      <div class="card"><h2>✨ 候选名管理</h2>
        <div id="candidatesContainer"></div>
        <button class="btn" onclick="addCandidate()">＋ 手动添加</button>
        <button class="btn ai" onclick="aiGenerateNames()">🤖 AI 起名 (需 DeepSeek Key)</button>
        <span id="aiStatus"></span>
      </div>
      <div class="card"><h2>📊 评分维度</h2><div id="dimContainer"></div><button class="btn" onclick="addDim()">＋ 添加维度</button></div>
      <div class="card"><h2>⚙️ 型号规则配置</h2>
        <label>规则模式（可多选）</label>
        <div class="option-group" id="rulePatterns">
          <button class="btn outline sm" onclick="toggleAllRulePatterns()">${allChecked?'取消':'全选'}</button>
          ${allPatterns.map(p => `<label><input type="checkbox" value="${p}" ${config.modelRule.rulePatterns.includes(p)?'checked':''} onchange="toggleRulePattern(this)"> ${p}</label>`).join('')}
        </div>
        <label>自定义规则描述</label>
        <div class="inline-add"><input id="customRuleText" value="${config.modelRule.customRuleText || ''}" placeholder="例：Lumis + 数字 + 后缀 + 功能字母"><button class="btn" onclick="document.getElementById('customRuleText').dispatchEvent(new Event('change'))">添加</button></div>
        <div class="library-box"><h3>数字档位库</h3><div id="digitLib"></div><div class="inline-add"><input id="newDigit" placeholder="自定义数字，逗号分隔"><button class="btn" onclick="addDigit()">添加</button></div></div>
        <div class="library-box"><h3>后缀库</h3><div id="suffixLib"></div><div class="inline-add"><input id="newSuffix" placeholder="自定义后缀，逗号分隔"><button class="btn" onclick="addSuffix()">添加</button></div></div>
        <div class="library-box"><h3>功能字母库</h3><div id="letterLib"></div><div class="inline-add"><input id="newLetter" placeholder="自定义字母，逗号分隔"><button class="btn" onclick="addLetter()">添加</button></div></div>
        <label>推荐型号组合（自动生成，可修改）</label>
        <textarea id="recommendedCombos" rows="6">${config.modelRule.recommendedCombos.join('\n')}</textarea>
      </div>
      <div class="card"><h2>👥 团队职能</h2><textarea id="teamOptions">${config.teamOptions.join(', ')}</textarea></div>
      <button class="btn gold" onclick="saveAndGenerate()" style="width:100%; padding:16px; font-size:18px;">🚀 生成问卷链接</button>
      <div id="surveyLinks" class="card hidden"><h2>🔗 问卷链接</h2><p>中文：<a id="linkZh" target="_blank"></a></p><p>英文：<a id="linkEn" target="_blank"></a></p></div>
      <div class="card" style="margin-top:20px;">
        <h2>📊 CEO 报告生成器</h2>
        <p>从 Google Sheets 自动拉取当前项目（<strong>${config.projectId}</strong>）的所有提交数据，一键生成 CEO 报告。</p>
        <button class="btn gold" onclick="generateCEOReport()">📈 生成 CEO 报告</button>
        <div id="reportOutput" class="report-box hidden" style="margin-top:16px;"></div>
      </div>
    `;
    document.getElementById('customRuleText').addEventListener('change', function() { config.modelRule.customRuleText = this.value; saveConfig(); });
    renderCandidates(); renderDims(); renderDigitLib(); renderSuffixLib(); renderLetterLib(); autoGenerateCombos();
  }

  function renderCandidates() {
    const c = document.getElementById('candidatesContainer');
    c.innerHTML = config.candidates.map((cand,i) => `
      <div class="candidate-row">
        <input value="${cand.name}" onchange="config.candidates[${i}].name=this.value; saveConfig();" placeholder="英文名">
        <input value="${cand.chinese}" onchange="config.candidates[${i}].chinese=this.value; saveConfig();" placeholder="中文音译">
        <input value="${cand.ipa || ''}" onchange="config.candidates[${i}].ipa=this.value; saveConfig();" placeholder="英标 (IPA)" style="flex:1">
        <input value="${cand.logic}" onchange="config.candidates[${i}].logic=this.value; saveConfig();" placeholder="中文命名逻辑" style="flex:2">
        <input value="${cand.logicEn || ''}" onchange="config.candidates[${i}].logicEn=this.value; saveConfig();" placeholder="英文逻辑 (English Logic)" style="flex:2">
        <button class="delete-btn" onclick="config.candidates.splice(${i},1); renderCandidates(); saveConfig();">✕</button>
      </div>`).join('');
  }
  window.addCandidate = () => { config.candidates.push({name:'',chinese:'',ipa:'',logic:'',logicEn:''}); renderCandidates(); saveConfig(); };

  function renderDims() {
    const c = document.getElementById('dimContainer');
    c.innerHTML = config.dimensions.map((d,i) => `
      <div class="dim-row">
        <input value="${d.name}" onchange="config.dimensions[${i}].name=this.value; saveConfig();" placeholder="维度名">
        <input type="number" value="${d.weight}" onchange="config.dimensions[${i}].weight=parseInt(this.value)||0; saveConfig();" style="width:70px;"> %
        <button class="delete-btn" onclick="config.dimensions.splice(${i},1); renderDims(); saveConfig();">✕</button>
      </div>`).join('');
  }
  window.addDim = () => { config.dimensions.push({name:'',weight:10}); renderDims(); saveConfig(); };

  window.toggleRulePattern = function(cb) {
    if(cb.checked) config.modelRule.rulePatterns.push(cb.value);
    else config.modelRule.rulePatterns = config.modelRule.rulePatterns.filter(p=>p!==cb.value);
    autoGenerateCombos(); saveConfig(); updateRulePatternButton();
  };
  window.toggleAllRulePatterns = function() {
    const all = ["命名+数字+后缀","命名+数字","命名+后缀","命名+数字+功能字母","命名+功能字母","命名+功能字母+后缀","命名"];
    const allSel = all.every(p => config.modelRule.rulePatterns.includes(p));
    config.modelRule.rulePatterns = allSel ? [] : [...all];
    document.querySelectorAll('#rulePatterns input').forEach(cb => cb.checked = config.modelRule.rulePatterns.includes(cb.value));
    updateRulePatternButton(); autoGenerateCombos(); saveConfig();
  };
  function updateRulePatternButton() {
    const all = ["命名+数字+后缀","命名+数字","命名+后缀","命名+数字+功能字母","命名+功能字母","命名+功能字母+后缀","命名"];
    const allSel = all.every(p => config.modelRule.rulePatterns.includes(p));
    const btn = document.querySelector('#rulePatterns .btn.sm');
    if(btn) btn.textContent = allSel ? '取消' : '全选';
  }

  function renderDigitLib() {
    let h = '';
    const allVals = Object.values(digitGroups).flatMap(g=>g.values);
    const custom = config.modelRule.digits.filter(d => !allVals.includes(d));
    for(let g in digitGroups){
      const vals = digitGroups[g].values, all = vals.every(v=>config.modelRule.digits.includes(v));
      h += `<div class="option-group"><strong>${digitGroups[g].label}</strong> <button class="btn outline sm" onclick="toggleSelDigits('${g}')">${all?'取消':'全选'}</button>`;
      vals.forEach(v => h += `<label><input type="checkbox" value="${v}" ${config.modelRule.digits.includes(v)?'checked':''} onchange="toggleDigit(this)"> ${v}</label>`);
      h += '</div>';
    }
    if(custom.length) {
      h += `<div class="option-group"><strong>自定义数字</strong> <button class="btn outline sm" onclick="toggleSelCustomDigits()">全选/取消</button>`;
      custom.forEach(v => h += `<label><input type="checkbox" value="${v}" ${config.modelRule.digits.includes(v)?'checked':''} onchange="toggleDigit(this)"> ${v}</label>`);
      h += '</div>';
    }
    document.getElementById('digitLib').innerHTML = h;
  }
  window.toggleSelDigits = (g) => {
    const vals = digitGroups[g].values, all = vals.every(v=>config.modelRule.digits.includes(v));
    if(all) config.modelRule.digits = config.modelRule.digits.filter(d => !vals.includes(d));
    else vals.forEach(v => { if(!config.modelRule.digits.includes(v)) config.modelRule.digits.push(v); });
    renderDigitLib(); autoGenerateCombos(); saveConfig();
  };
  window.toggleSelCustomDigits = () => {
    const allVals = Object.values(digitGroups).flatMap(g=>g.values);
    const custom = config.modelRule.digits.filter(d => !allVals.includes(d));
    const all = custom.every(d => config.modelRule.digits.includes(d));
    if(all) config.modelRule.digits = config.modelRule.digits.filter(d => allVals.includes(d));
    else custom.forEach(d => { if(!config.modelRule.digits.includes(d)) config.modelRule.digits.push(d); });
    renderDigitLib(); autoGenerateCombos(); saveConfig();
  };
  window.toggleDigit = function(cb) {
    if(cb.checked) { if(!config.modelRule.digits.includes(cb.value)) config.modelRule.digits.push(cb.value); }
    else config.modelRule.digits = config.modelRule.digits.filter(d => d!==cb.value);
    autoGenerateCombos(); saveConfig();
  };
  window.addDigit = () => {
    const raw = document.getElementById('newDigit').value.trim();
    if(!raw) return;
    raw.split(',').forEach(v => { if(v && !config.modelRule.digits.includes(v)) config.modelRule.digits.push(v); });
    renderDigitLib(); autoGenerateCombos(); saveConfig(); document.getElementById('newDigit').value = '';
  };

  function renderSuffixLib() {
    let h = `<div class="option-group"><button class="btn outline sm" onclick="toggleSelSuffixes()">${suffixPool.every(s=>config.modelRule.suffixes.includes(s))?'取消':'全选'}</button>`;
    suffixPool.forEach(s => h += `<label><input type="checkbox" value="${s}" ${config.modelRule.suffixes.includes(s)?'checked':''} onchange="toggleSuffix(this)"> ${s}</label>`);
    h += '</div>';
    const custom = config.modelRule.suffixes.filter(s => !suffixPool.includes(s));

  // ==================== 自动生成推荐组合（修正版） ====================
  function autoGenerateCombos() {
    const patterns = config.modelRule.rulePatterns;
    const digits = config.modelRule.digits;
    const suffixes = config.modelRule.suffixes;
    const letters = config.modelRule.funcLetters;
    const combos = [];

    const allGroupVals = Object.values(digitGroups).flatMap(g => g.values);
    const series = ['ones','tens','hundreds','thousands'].map(g => digits.find(d => digitGroups[g].values.includes(d))).filter(Boolean);
    const custom = digits.filter(d => !allGroupVals.includes(d));
    const samples = [...new Set([...series, ...custom])];
    if (samples.length === 0) samples.push('70');

    const sfx = suffixes.length > 0 ? suffixes[0] : null;
    const ltr = letters.length > 0 ? letters[0] : null;

    patterns.forEach(pattern => {
      if (pattern.includes('数字') && digits.length === 0) return;
      if (pattern.includes('后缀') && suffixes.length === 0) return;
      if (pattern.includes('功能字母') && letters.length === 0) return;
      if (pattern === "命名+后缀") combos.push(`${config.productLine} ${sfx}`);
      else if (pattern === "命名+功能字母") combos.push(`${config.productLine} ${ltr}`);
      else if (pattern === "命名+功能字母+后缀") combos.push(`${config.productLine} ${ltr} ${sfx}`);
      else if (pattern === "命名+数字+后缀") samples.forEach(d => combos.push(`${config.productLine} ${d} ${sfx}`));
      else if (pattern === "命名+数字") samples.forEach(d => combos.push(`${config.productLine} ${d}`));
      else if (pattern === "命名+数字+功能字母") samples.forEach(d => combos.push(`${config.productLine} ${d} ${ltr}`));
      else if (pattern === "命名") combos.push(config.productLine);
    });

    config.modelRule.recommendedCombos = [...new Set(combos)];
    if(document.getElementById('recommendedCombos')) document.getElementById('recommendedCombos').value = config.modelRule.recommendedCombos.join('\n');
    saveConfig();
  }

   // ==================== CEO 报告生成器（CSV 版本） ====================
  async function generateCEOReport() {
    const projectId = config.projectId;
    const output = document.getElementById('reportOutput');
    output.classList.remove('hidden');
    output.innerHTML = '<p>正在从 Google Sheets 拉取数据…</p>';

    try {
      const resp = await fetch(CSV_URL);
      const csvText = await resp.text();

      // 解析 CSV（支持字段内的逗号、引号）
      const rows = parseCSV(csvText);
      if (rows.length === 0) {
        output.innerHTML = '<p>CSV 文件中没有数据。</p>';
        return;
      }

      // 筛选当前项目的数据
      // Sheet 列顺序：时间戳, projectId, department, intuition, custom_name, custom_reason,
      // navos_weighted, cynos_weighted, toris_weighted, navix_weighted, lumis_weighted,
      // rule_patterns, digits, suffixes, letters, model_feedback, scores_json
      const submissions = [];
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        if (row.length < 11) continue; // 至少要有加权分列
        // 跳过表头行（检查第一列是否为“时间戳”等）
        if (i === 0 && (row[0].includes('时间戳') || row[0].toLowerCase().includes('timestamp'))) continue;
        // projectId 在第 1 列（索引 1）
        if (row[1] !== projectId) continue;
        submissions.push({
          dept: row[2] || '',
          intuition: row[3] || '',
          scores: {
            Navos: parseFloat(row[6]) || 0,
            Cynos: parseFloat(row[7]) || 0,
            Toris: parseFloat(row[8]) || 0,
            Navix: parseFloat(row[9]) || 0,
            Lumis: parseFloat(row[10]) || 0
          },
          custom: row[4] || ''
        });
      }

      if (submissions.length === 0) {
        output.innerHTML = '<p>当前项目暂无提交数据。</p>';
        return;
      }

      const candidates = ['Navos', 'Cynos', 'Toris', 'Navix', 'Lumis'];
      const overallAvg = {};
      candidates.forEach(name => {
        const scores = submissions.map(d => d.scores[name]).filter(s => s !== undefined);
        overallAvg[name] = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1);
      });

      const sortedCandidates = [...candidates].sort((a, b) => overallAvg[b] - overallAvg[a]);

      let reportHTML = `<h3>📈 ${config.productLine} 命名评估报告</h3>`;
      reportHTML += `<p><strong>项目 ID：</strong> ${projectId} | <strong>总提交数：</strong> ${submissions.length}</p>`;
      reportHTML += `<table><thead><tr><th>排名</th><th>候选名</th><th>平均加权总分</th></tr></thead><tbody>`;
      sortedCandidates.forEach((name, idx) => {
        reportHTML += `<tr><td>${idx + 1}</td><td>${name}</td><td>${overallAvg[name]}</td></tr>`;
      });
      reportHTML += `</tbody></table>`;
      reportHTML += `<p style="margin-top:16px;"><strong>✅ 决策建议：</strong>首选 <strong>${sortedCandidates[0]}</strong>（平均分 ${overallAvg[sortedCandidates[0]]}）。`;
      if (submissions.length === 1) {
        reportHTML += `<p style="color:#888;">⚠️ 当前仅有 1 份提交，建议收集更多数据后再做决策。</p>`;
      }
      output.innerHTML = reportHTML;
    } catch (err) {
      output.innerHTML = `<p style="color:red;">获取数据失败：${err.message}</p>`;
    }
  }

  // 简易 CSV 解析器（处理引号内的逗号和双引号转义）
  function parseCSV(text) {
    const rows = [];
    const lines = text.split(/\r?\n/);
    for (let line of lines) {
      if (line.trim() === '') continue;
      const cols = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"') {
            if (i + 1 < line.length && line[i + 1] === '"') {
              current += '"';
              i++;
            } else {
              inQuotes = false;
            }
          } else {
            current += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ',') {
            cols.push(current);
            current = '';
          } else {
            current += ch;
          }
        }
      }
      cols.push(current);
      rows.push(cols);
    }
    return rows;
  }

    const scores = {};
    cfg.candidates.forEach(c => {
      const sels = document.querySelectorAll(`select[data-candidate="${c.name}"]`);
      let sum = 0, allFilled = true;
      sels.forEach(sel => {
        if (!sel.value) allFilled = false;
        else sum += parseInt(sel.value) * (cfg.dimensions.find(d => d.name === sel.dataset.dimension).weight / 100);
      });
      scores[c.name] = { allFilled, weighted: allFilled ? Math.round(sum * 100) / 10 : 0 };
    });
    return scores;
  }

  function renderSurveySelections(cfg, isZh, T, tGroup) {
    let digitHtml = '';
    for (let grp in digitGroups) {
      const g = digitGroups[grp];
      const active = g.values.filter(v => cfg.modelRule.digits.includes(v));
      if (active.length === 0) continue;
      digitHtml += `<div class="option-group"><strong>${tGroup(grp)}</strong> <button class="btn outline sm" id="digitToggle_${grp}" onclick="toggleSurveyDigitGroup('${grp}')">${T('全选', 'Select All')}</button>`;
      active.forEach(v => digitHtml += `<label><input type="checkbox" value="${v}"> ${v}</label>`);
      digitHtml += '</div>';
    }
    const allGroupVals = Object.values(digitGroups).flatMap(g => g.values);
    const customDigs = cfg.modelRule.digits.filter(d => !allGroupVals.includes(d));
    if (customDigs.length) {
      digitHtml += `<div class="option-group"><strong>${T('自定义数字', 'Custom Digits')}</strong> <button class="btn outline sm" id="digitToggle_custom" onclick="toggleSurveyCustomDigits()">${T('全选', 'Select All')}</button>`;
      customDigs.forEach(v => digitHtml += `<label><input type="checkbox" value="${v}"> ${v}</label>`);
      digitHtml += '</div>';
    }
    document.getElementById('digitSelect').innerHTML = digitHtml || T('无可用数字', 'No digits available');
    document.getElementById('suffixSelect').innerHTML = `<div class="option-group"><button class="btn outline sm" id="suffixToggleBtn" onclick="toggleSurveyGroup('suffixSelect', 'suffixToggleBtn')">${T('全选', 'Select All')}</button>${cfg.modelRule.suffixes.map(s => `<label><input type="checkbox" value="${s}"> ${s}</label>`).join('')}</div>`;
    document.getElementById('letterSelect').innerHTML = cfg.modelRule.funcLetters.length ? `<div class="option-group"><button class="btn outline sm" id="letterToggleBtn" onclick="toggleSurveyGroup('letterSelect', 'letterToggleBtn')">${T('全选', 'Select All')}</button>${cfg.modelRule.funcLetters.map(l => `<label><input type="checkbox" value="${l}"> ${l}</label>`).join('')}</div>` : T('未启用', 'Disabled');
  }

  window.toggleSurveyGroup = (divId, btnId) => {
    const cbs = document.querySelectorAll(`#${divId} input[type="checkbox"]`);
    const allChecked = Array.from(cbs).every(cb => cb.checked);
    cbs.forEach(cb => cb.checked = !allChecked);
    const btn = document.getElementById(btnId);
    if (btn) btn.textContent = allChecked ? '全选' : '取消';
    window._updateCombos && window._updateCombos();
  };
  window.toggleSurveyDigitGroup = (grp) => {
    const vals = digitGroups[grp].values.filter(v => config.modelRule.digits.includes(v));
    const cbs = document.querySelectorAll('#digitSelect input[type="checkbox"]');
    const groupCbs = Array.from(cbs).filter(cb => vals.includes(cb.value));
    const allChecked = groupCbs.every(cb => cb.checked);
    groupCbs.forEach(cb => cb.checked = !allChecked);
    const btn = document.getElementById(`digitToggle_${grp}`);
    if (btn) btn.textContent = allChecked ? '全选' : '取消';
    window._updateCombos && window._updateCombos();
  };
  window.toggleSurveyCustomDigits = () => {
    const allGroupVals = Object.values(digitGroups).flatMap(g => g.values);
    const customDigs = config.modelRule.digits.filter(d => !allGroupVals.includes(d));
    const cbs = document.querySelectorAll('#digitSelect input[type="checkbox"]');
    const customCbs = Array.from(cbs).filter(cb => customDigs.includes(cb.value));
    const allChecked = customCbs.every(cb => cb.checked);
    customCbs.forEach(cb => cb.checked = !allChecked);
    const btn = document.getElementById('digitToggle_custom');
    if (btn) btn.textContent = allChecked ? '全选' : '取消';
    window._updateCombos && window._updateCombos();
  };

  function generateCombosForName(name, cfg) {
    const checkedDigits = Array.from(document.querySelectorAll('#digitSelect input:checked')).map(cb => cb.value);
    const checkedSuffixes = Array.from(document.querySelectorAll('#suffixSelect input:checked')).map(cb => cb.value);
    const checkedLetters = Array.from(document.querySelectorAll('#letterSelect input:checked')).map(cb => cb.value);
    const checkedPatterns = Array.from(document.querySelectorAll('#rulePatternSelect input:checked')).map(cb => cb.value);

    const combos = [];
    // 移除早期清空逻辑，每个模式独立判断

    const getFirst = (group) => checkedDigits.find(d => digitGroups[group].values.includes(d));
    const series = ['ones', 'tens', 'hundreds', 'thousands'].map(g => getFirst(g)).filter(Boolean);
    const allGroupVals = Object.values(digitGroups).flatMap(g => g.values);
    const customDigits = checkedDigits.filter(d => !allGroupVals.includes(d));
    const sampleDigits = [...new Set([...series, ...customDigits])];
    if (sampleDigits.length === 0) sampleDigits.push('70');

    const sfx = checkedSuffixes.length > 0 ? checkedSuffixes[0] : null;
    const ltr = checkedLetters.length > 0 ? checkedLetters[0] : null;

    checkedPatterns.forEach(pattern => {
      if (pattern.includes('数字') && checkedDigits.length === 0) return;
      if (pattern.includes('后缀') && checkedSuffixes.length === 0) return;
      if (pattern.includes('功能字母') && checkedLetters.length === 0) return;
      if (pattern === "命名+后缀") combos.push(`${name} ${sfx}`);
      else if (pattern === "命名+功能字母") combos.push(`${name} ${ltr}`);
      else if (pattern === "命名+功能字母+后缀") combos.push(`${name} ${ltr} ${sfx}`);
      else if (pattern === "命名+数字+后缀") sampleDigits.forEach(d => combos.push(`${name} ${d} ${sfx}`));
      else if (pattern === "命名+数字") sampleDigits.forEach(d => combos.push(`${name} ${d}`));
      else if (pattern === "命名+数字+功能字母") sampleDigits.forEach(d => combos.push(`${name} ${d} ${ltr}`));
      else if (pattern === "命名") combos.push(name);
    });

    document.getElementById('comboExamples').innerHTML = combos.map(c => `<span class="chip">${c}</span>`).join('');
  }

  function updateSurveyScores(cfg, isZh, T) {
    let filled = 0;
    cfg.candidates.forEach(c => {
      const sels = document.querySelectorAll(`select[data-candidate="${c.name}"]`);
      let sum = 0, all = true;
      sels.forEach(sel => {
        if (!sel.value) all = false;
        else sum += parseInt(sel.value) * (cfg.dimensions.find(d => d.name === sel.dataset.dimension).weight / 100);
      });
      const card = document.getElementById(`card-${c.name}`);
      if (card) { card.querySelector('.score').textContent = all ? Math.round(sum * 100) / 10 : '--'; if (all) filled += cfg.dimensions.length; }
    });

    const total = cfg.candidates.length * cfg.dimensions.length;
    const skip = document.getElementById('skipCandidates')?.checked || false;
    const btn = document.getElementById('submitBtn'), status = document.getElementById('status');
    if (skip || filled === total) {
      status.textContent = T('✅ 可以提交', '✅ Ready to submit.');
      btn.disabled = false;
      btn.textContent = T('✅ 提交评估', '✅ Submit Assessment');
    } else {
      status.textContent = T(`⚠️ 还有 ${total - filled} 个评分项未完成`, `⚠️ ${total - filled} scoring fields remaining.`);
      btn.disabled = true;
      btn.textContent = T('请完整填写所有评分项', 'Please complete all scoring fields');
    }
  }

  function submitSurvey(cfg) {
    const dept = document.getElementById('dept').value;
    if (!dept) return alert('请选择团队职能');
    const scores = {};
    const skip = document.getElementById('skipCandidates')?.checked || false;
    if (!skip) {
      cfg.candidates.forEach(c => {
        const s = {};
        cfg.dimensions.forEach(d => {
          const sel = document.querySelector(`select[data-candidate="${c.name}"][data-dimension="${d.name}"]`);
          s[d.name] = sel?.value || '';
        });
        let sum = 0; cfg.dimensions.forEach(d => sum += parseInt(s[d.name]) * (d.weight / 100));
        s.weighted = Math.round(sum * 100) / 10; scores[c.name] = s;
      });
    }
    const patterns = Array.from(document.querySelectorAll('#rulePatternSelect input:checked')).map(cb => cb.value);
    const digits = Array.from(document.querySelectorAll('#digitSelect input:checked')).map(cb => cb.value);
    const suffixes = Array.from(document.querySelectorAll('#suffixSelect input:checked')).map(cb => cb.value);
    const letters = Array.from(document.querySelectorAll('#letterSelect input:checked')).map(cb => cb.value);

    const templateParams = {
      projectId: cfg.projectId || '',
      department: dept, intuition: document.getElementById('intuition').value,
      custom_name: document.getElementById('customName').value, custom_reason: document.getElementById('customReason').value,
      navos_weighted: scores['Navos']?.weighted || '', cynos_weighted: scores['Cynos']?.weighted || '',
      toris_weighted: scores['Toris']?.weighted || '', navix_weighted: scores['Navix']?.weighted || '',
      lumis_weighted: scores['Lumis']?.weighted || '', rule_patterns: patterns.join(', '),
      digits: digits.join(', '), suffixes: suffixes.join(', '), letters: letters.join(', '),
      model_feedback: document.getElementById('modelFeedback').value, scores_json: JSON.stringify(scores)
    };

    // 发送到 EmailJS
    fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        service_id: EMAILJS_SERVICE_ID,
        template_id: EMAILJS_TEMPLATE_ID,
        user_id: EMAILJS_PUBLIC_KEY,
        template_params: templateParams
      })
    })
    .then(() => {
      showToast('提交成功！');
      // 同时发送到 Google Sheets
      return fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(templateParams)
      });
    })
    .catch(() => {
      fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(templateParams)
      });
      document.getElementById('fallbackBox').style.display = 'block';
    });
  }
  function copyFallback() { const ta = document.getElementById('fallbackData'); ta.select(); document.execCommand('copy'); showToast('已复制'); }
  function showToast(msg) { const t = document.getElementById('toast'); if (t) { t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); } }
</script>
