<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VINNO 命名评估系统</title>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
<style>
    :root {
      --primary: #0a1628; --primary-light: #13233f; --accent: #1e3a5f;
      --gold: #c9a74b; --bg: #f0f2f5; --card-bg: #ffffff;
      --text: #1e293b; --border: #e2e8f0; --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --radius: 14px; --radius-sm: 10px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height:1.6; padding:12px; }
    .container { max-width:1120px; margin:0 auto; }

    .header { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color:white; padding:24px 20px; border-radius:18px; margin-bottom:16px; text-align:center; box-shadow:0 6px 24px rgba(0,0,0,0.1); }
    .header h1 { font-size: clamp(18px, 4.5vw, 28px); }
    .header p { font-size:14px; opacity:0.85; margin-top:6px; }

    .card { background:var(--card-bg); border-radius:var(--radius); padding:20px 16px; margin-bottom:14px; box-shadow:var(--shadow); border:1px solid var(--border); }
    h2 { font-size:18px; margin-bottom:12px; color:var(--primary); display:flex; align-items:center; gap:6px; }
    h3 { font-size:16px; margin:12px 0 8px; color:var(--accent); }

    label { display:block; font-weight:600; margin:10px 0 4px; font-size:14px; }
    input, textarea, select { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:16px; margin-bottom:8px; background:white; -webkit-appearance:none; }
    textarea { min-height:60px; resize:vertical; }

    .btn { padding:12px 20px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:600; cursor:pointer; font-size:15px; display:inline-flex; align-items:center; justify-content:center; gap:6px; white-space:nowrap; transition:background 0.2s; }
    .btn:active { opacity:0.85; }
    .btn.gold { background:var(--gold); color:#000; }
    .btn.ai { background:#7c3aed; }
    .btn.outline { background:white; color:var(--accent); border:2px solid var(--accent); }
    .btn.danger { background:#e74c3c; }
    .btn.sm { padding:4px 12px; font-size:13px; border-radius:8px; }
    .hidden { display:none !important; }

    .chip { background:#eef2ff; padding:5px 14px; border-radius:16px; display:inline-block; margin:4px; font-size:13px; border:1px solid #dde4ff; }

    .matrix-wrap { overflow-x:auto; border-radius:10px; border:1px solid var(--border); -webkit-overflow-scrolling:touch; position:relative; }
    .matrix-wrap::after {
      content: "← 左右滑动查看 →";
      display: none;
      position: sticky;
      left: 50%; bottom: 0;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 6px 16px;
      border-radius: 12px;
      font-size: 12px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 20;
    }

    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { background:var(--primary); color:white; padding:10px 8px; font-weight:600; text-align:center; font-size:12px; white-space:nowrap; }
    td { border:1px solid var(--border); padding:8px 6px; text-align:center; background:white; }

    .name-cell {
      text-align:left; font-weight:600; background:#f8fafc;
      position:sticky; left:0; z-index:5;
      max-width:160px; min-width:120px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      padding-left:12px !important;
      box-shadow: 4px 0 8px rgba(0,0,0,0.04);
    }
    .name-cell small { display:block; font-weight:400; color:#666; font-size:11px; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    th:first-child { position:sticky; left:0; z-index:10; background:var(--primary); min-width:120px; }
    td:first-child { z-index:5; }

    select.score-select { width:52px; padding:8px 4px; border-radius:6px; text-align:center; font-size:15px; cursor:pointer; }

    tr.scored td { background:#f0f7ff; transition:background 0.3s; }
    tr.scored td.name-cell { background:#e6f0fa; }

    .live-scores { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .live-card { background:#f8fafc; border-radius:10px; padding:14px 10px; text-align:center; flex:1 1 90px; border:2px solid transparent; min-width:80px; transition:all 0.3s; }
    .live-card .name { font-size:13px; font-weight:700; margin-bottom:4px; }
    .live-card .score { font-size:22px; font-weight:800; color:var(--accent); }
    .live-card.leader { border-color:var(--gold); background:#fffdf5; box-shadow:0 0 12px rgba(201,167,75,0.2); }
    .live-card.leader .score { color:#b8860b; }

    .completion-status { margin-top:12px; padding:10px 14px; border-radius:8px; font-size:14px; font-weight:600; }
    .completion-status.ready { background:#e6f7ed; color:#1a7a3a; }
    .completion-status.pending { background:#fff3cd; color:#856404; }

    .custom-name-box { background:#f0f9ff; border:1px solid #bae6fd; border-radius:10px; padding:16px; margin:12px 0; }

    .option-group { display:flex; flex-wrap:wrap; align-items:center; gap:6px 10px; margin-bottom:8px; }
    .option-group strong { margin-right:6px; font-size:14px; }
    .option-group label { display:inline-flex; align-items:center; margin:0; font-weight:400; cursor:pointer; white-space:nowrap; font-size:14px; }
    .option-group input[type="checkbox"] {
      margin-right:4px;
      cursor:pointer;
      width:18px;
      height:18px;
      min-width:18px;
      min-height:18px;
      accent-color: var(--accent);
      appearance: auto;
      -webkit-appearance: auto;
      position: relative;
      display: inline-block;
      vertical-align: middle;
    }
    .skip-candidates-label input[type="checkbox"] {
      width:18px !important;
      height:18px !important;
      min-width:18px !important;
      min-height:18px !important;
      accent-color: var(--accent);
      appearance: auto !important;
      -webkit-appearance: auto !important;
      display: inline-block !important;
      vertical-align: middle;
      position: relative;
    }

    .library-box { border:1px solid var(--border); border-radius:10px; padding:14px; margin:10px 0; background:#fafbfc; }
    .inline-add { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .inline-add input { flex:1; min-width:140px; }
    .candidate-row, .dim-row { display:flex; gap:8px; margin-bottom:8px; align-items:center; flex-wrap:wrap; }
    .candidate-row input, .dim-row input { flex:1; min-width:110px; }
    .delete-btn { background:#e74c3c; color:white; border:none; border-radius:6px; padding:6px 12px; cursor:pointer; font-size:14px; }
    .skip-candidates-label { display:flex !important; align-items:center !important; gap:8px !important; margin-top:12px !important; flex-wrap:wrap; }
    .skip-candidates-label input[type="checkbox"] { width:auto !important; margin:0 !important; }

    .report-box { background:#f8fafc; border:1px solid var(--border); border-radius:10px; padding:16px; margin-top:10px; overflow-x:auto; }

    .submit-area { position:sticky; bottom:12px; z-index:20; margin-top:16px; }
    .submit-area .btn { width:100%; padding:16px; font-size:17px; border-radius:14px; box-shadow:0 4px 16px rgba(0,0,0,0.15); }
    .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1e293b; color:white; padding:12px 28px; border-radius:20px; font-size:15px; z-index:100; display:none; }

    #comboExamples { display:flex; flex-wrap:wrap; gap:6px; }

    /* ========== 平板（768px 以下） ========== */
    @media (max-width: 768px) {
      body { padding:6px; }
      .header { padding:20px 14px; border-radius:14px; }
      .header h1 { font-size:17px; }
      .header p { font-size:13px; }
      .card { padding:16px 12px; border-radius:12px; margin-bottom:10px; }
      h2 { font-size:17px; }

      .btn { width:100%; justify-content:center; }
      .btn.sm { width:auto; }
      .btn.outline { width:auto; }

      .matrix-wrap::after { display:block; }
      table { font-size:11px; }
      th { padding:8px 4px; font-size:11px; }
      td { padding:6px 4px; }
      .name-cell { max-width:100px; min-width:100px; font-size:13px; }
      .name-cell small { font-size:10px; }
      th:first-child { min-width:100px; }
      select.score-select { width:44px; padding:6px 2px; font-size:14px; }

      .live-scores { justify-content:center; }
      .live-card { flex:1 1 75px; min-width:70px; padding:10px 6px; }
      .live-card .name { font-size:12px; }
      .live-card .score { font-size:18px; }

      .option-group { gap:4px 6px; }
      .option-group label { font-size:13px; }
      .candidate-row, .dim-row { flex-direction:column; align-items:stretch; }
      .candidate-row input, .dim-row input { min-width:0; }
      .inline-add { flex-direction:column; align-items:stretch; }
      .inline-add input { min-width:0; }
      .delete-btn { align-self:flex-end; }
    }

    /* ========== 小手机（480px 以下） ========== */
    @media (max-width: 480px) {
      .header h1 { font-size:16px; }
      .card { padding:12px 8px; }
      table { font-size:10px; }
      th, td { padding:5px 3px; }
      .name-cell { max-width:80px; min-width:80px; font-size:12px; }
      th:first-child { min-width:80px; }
      select.score-select { width:38px; padding:4px 1px; font-size:13px; }
      .live-card { flex:1 1 65px; min-width:60px; padding:8px 4px; }
      .live-card .score { font-size:16px; }
    }
</style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

  // ==================== 自动生成推荐组合（修正版） ====================
  function autoGenerateCombos() {
    const patterns = config.modelRule.rulePatterns;
    const digits = config.modelRule.digits;
    const suffixes = config.modelRule.suffixes;
    const letters = config.modelRule.funcLetters;
    const combos = [];

    const allGroupVals = Object.values(digitGroups).flatMap(g => g.values);
    const series = ['ones','tens','hundreds','thousands'].map(g => digits.find(d => digitGroups[g].values.includes(d))).filter(Boolean);
    const custom = digits.filter(d => !allGroupVals.includes(d));
    const samples = [...new Set([...series, ...custom])];
    if (samples.length === 0) samples.push('70');

    const sfx = suffixes.length > 0 ? suffixes[0] : null;
    const ltr = letters.length > 0 ? letters[0] : null;

    patterns.forEach(pattern => {
      if (pattern.includes('数字') && digits.length === 0) return;
      if (pattern.includes('后缀') && suffixes.length === 0) return;
      if (pattern.includes('功能字母') && letters.length === 0) return;
      if (pattern === "命名+后缀") combos.push(`${config.productLine} ${sfx}`);
      else if (pattern === "命名+功能字母") combos.push(`${config.productLine} ${ltr}`);
      else if (pattern === "命名+功能字母+后缀") combos.push(`${config.productLine} ${ltr} ${sfx}`);
      else if (pattern === "命名+数字+后缀") samples.forEach(d => combos.push(`${config.productLine} ${d} ${sfx}`));
      else if (pattern === "命名+数字") samples.forEach(d => combos.push(`${config.productLine} ${d}`));
      else if (pattern === "命名+数字+功能字母") samples.forEach(d => combos.push(`${config.productLine} ${d} ${ltr}`));
      else if (pattern === "命名") combos.push(config.productLine);
    });

    config.modelRule.recommendedCombos = [...new Set(combos)];
    if(document.getElementById('recommendedCombos')) document.getElementById('recommendedCombos').value = config.modelRule.recommendedCombos.join('\n');
    saveConfig();
  }

  // ==================== CEO 报告生成器（集成精美报告 + 导出 PDF） ====================
  async function generateCEOReport() {
    const projectId = config.projectId;
    const output = document.getElementById('reportOutput');
    output.classList.remove('hidden');
    output.innerHTML = '<p style="text-align:center;padding:40px;">正在从 Google Sheets 拉取最新数据…</p>';

    try {
      // 1. 获取 CSV 数据
      const resp = await fetch(CSV_URL);
      const csvText = await resp.text();
      const allRows = parseCSV(csvText);
      if (allRows.length === 0) {
        output.innerHTML = '<p>CSV 文件中没有数据。</p>';
        return;
      }

      // 2. 解析提交数据
      let startIndex = 0;
      if (allRows[0][0].includes('时间戳') || allRows[0][0].toLowerCase().includes('timestamp')) {
        startIndex = 1;
      }

      const rawData = [];
      const candidateSet = new Set();
      for (let i = startIndex; i < allRows.length; i++) {
        const row = allRows[i];
        if (row.length < 6) continue;
        if ((row[1] || '').trim() !== projectId) continue;

        const dept = (row[2] || '未知').trim();
        const intuition = (row[3] || '').trim();
        const customName = (row[4] || '').trim();
        const customReason = (row[5] || '').trim();
        const scoresJsonStr = row[row.length - 1];
        if (!scoresJsonStr) continue;

        let scoresObj;
        try { scoresObj = JSON.parse(scoresJsonStr); } catch (e) { continue; }

        const scores = {};
        for (let name in scoresObj) {
          const w = parseFloat(scoresObj[name].weighted);
          if (!isNaN(w)) {
            scores[name.trim()] = w;
            candidateSet.add(name.trim());
          }
        }
        if (Object.keys(scores).length === 0) continue;

        rawData.push({ dept, intuition, scores, custom: customName, customReason, rawScores: scoresObj });
      }

      // 统一部门英文名
      rawData.forEach(d => {
        if (d.dept === 'International Clinical Applications') d.dept = '国际临床应用部';
        if (d.dept === 'International Market') d.dept = '国际市场部';
      });

      const candidates = Array.from(candidateSet).sort();
      if (candidates.length === 0) {
        output.innerHTML = '<p>当前项目暂无提交数据。</p>';
        return;
      }

      const colorPool = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#ec4899','#06b6d4','#f97316'];
      const colorMap = {};
      candidates.forEach((n, i) => colorMap[n] = colorPool[i % colorPool.length]);

      const dimensionInfo = [
        { key: '战略匹配度', weight: 20 },{ key: '记忆度', weight: 15 },{ key: '发音友好度', weight: 15 },
        { key: '视觉美观度', weight: 10 },{ key: '语义联想', weight: 15 },{ key: '品牌一致性', weight: 10 },
        { key: '延展性', weight: 10 },{ key: '风险控制', weight: 5 }
      ];

      // 3. 计算指标
      const overallAvg = {};
      candidates.forEach(name => {
        const list = rawData.map(d => d.scores[name]).filter(s => s !== undefined);
        overallAvg[name] = list.length ? (list.reduce((a,b)=>a+b,0) / list.length).toFixed(1) : null;
      });
      const sorted = candidates.filter(n => overallAvg[n] !== null).sort((a,b)=> parseFloat(overallAvg[b])-parseFloat(overallAvg[a]));

      const deptGroups = {};
      rawData.forEach(d => {
        if (!deptGroups[d.dept]) deptGroups[d.dept] = [];
        deptGroups[d.dept].push(d);
      });
      const deptLabels = Object.keys(deptGroups);

      const intuitionCount = {};
      rawData.forEach(d => {
        if (d.intuition && d.intuition !== 'custom') intuitionCount[d.intuition] = (intuitionCount[d.intuition]||0)+1;
        else if (d.intuition === 'custom') intuitionCount['自定义'] = (intuitionCount['自定义']||0)+1;
      });

      const dimTotals = {}, dimCounts = {};
      candidates.forEach(n => { dimTotals[n]={}; dimCounts[n]={}; dimensionInfo.forEach(d=>{ dimTotals[n][d.key]=0; dimCounts[n][d.key]=0; }); });
      rawData.forEach(e => {
        const rs = e.rawScores;
        for (let name in rs) {
          const trimName = name.trim();
          if (!candidates.includes(trimName)) continue;
          const dims = rs[name];
          dimensionInfo.forEach(dim => {
            const v = parseFloat(dims[dim.key]);
            if (!isNaN(v)) { dimTotals[trimName][dim.key] += v; dimCounts[trimName][dim.key] += 1; }
          });
        }
      });
      const dimAvg = {};
      candidates.forEach(n => {
        dimAvg[n] = {};
        dimensionInfo.forEach(dim => dimAvg[n][dim.key] = dimCounts[n][dim.key] ? (dimTotals[n][dim.key]/dimCounts[n][dim.key]).toFixed(1) : '-');
      });

      const customEntries = rawData.filter(d => d.custom);

      // 4. 构建报告 HTML（包含导出按钮）

  function parseCSV(text) {
    const rows = [];
    const lines = text.split(/\r?\n/);
    for (let line of lines) {
      if (line.trim() === '') continue;
      const cols = [];
      let current = '', inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"') { if(line[i+1]==='"'){ current+='"'; i++; } else inQuotes=false; }
          else current += ch;
        } else {
          if (ch === '"') inQuotes = true;
          else if (ch === ',') { cols.push(current); current = ''; }
          else current += ch;
        }
      }
      cols.push(current);
      rows.push(cols);
    }
    return rows;
  }

  function getCandidateScores(cfg) {
    const scores = {};
    cfg.candidates.forEach(c => {
      const sels = document.querySelectorAll(`select[data-candidate="${c.name}"]`);
      let sum = 0, allFilled = true;
      sels.forEach(sel => {
        if (!sel.value) allFilled = false;
        else sum += parseInt(sel.value) * (cfg.dimensions.find(d => d.name === sel.dataset.dimension).weight / 100);
      });
      scores[c.name] = { allFilled, weighted: allFilled ? Math.round(sum * 100) / 10 : 0 };
    });
    return scores;
  }

  function generateCombosForName(name, cfg) {
    const checkedDigits = Array.from(document.querySelectorAll('#digitSelect input:checked')).map(cb => cb.value);
    const checkedSuffixes = Array.from(document.querySelectorAll('#suffixSelect input:checked')).map(cb => cb.value);
    const checkedLetters = Array.from(document.querySelectorAll('#letterSelect input:checked')).map(cb => cb.value);
    const checkedPatterns = Array.from(document.querySelectorAll('#rulePatternSelect input:checked')).map(cb => cb.value);

    const combos = [];
    // 移除早期清空逻辑，每个模式独立判断

    const getFirst = (group) => checkedDigits.find(d => digitGroups[group].values.includes(d));
    const series = ['ones', 'tens', 'hundreds', 'thousands'].map(g => getFirst(g)).filter(Boolean);
    const allGroupVals = Object.values(digitGroups).flatMap(g => g.values);
    const customDigits = checkedDigits.filter(d => !allGroupVals.includes(d));
    const sampleDigits = [...new Set([...series, ...customDigits])];
    if (sampleDigits.length === 0) sampleDigits.push('70');

    const sfx = checkedSuffixes.length > 0 ? checkedSuffixes[0] : null;
    const ltr = checkedLetters.length > 0 ? checkedLetters[0] : null;

    checkedPatterns.forEach(pattern => {
      if (pattern.includes('数字') && checkedDigits.length === 0) return;
      if (pattern.includes('后缀') && checkedSuffixes.length === 0) return;
      if (pattern.includes('功能字母') && checkedLetters.length === 0) return;
      if (pattern === "命名+后缀") combos.push(`${name} ${sfx}`);
      else if (pattern === "命名+功能字母") combos.push(`${name} ${ltr}`);
      else if (pattern === "命名+功能字母+后缀") combos.push(`${name} ${ltr} ${sfx}`);
      else if (pattern === "命名+数字+后缀") sampleDigits.forEach(d => combos.push(`${name} ${d} ${sfx}`));
      else if (pattern === "命名+数字") sampleDigits.forEach(d => combos.push(`${name} ${d}`));
      else if (pattern === "命名+数字+功能字母") sampleDigits.forEach(d => combos.push(`${name} ${d} ${ltr}`));
      else if (pattern === "命名") combos.push(name);
    });

    document.getElementById('comboExamples').innerHTML = combos.map(c => `<span class="chip">${c}</span>`).join('');
  }

    // 高亮已评完的行
   const rows = document.querySelectorAll('#matrixBody tr');
   rows.forEach(row => {
     const selects = row.querySelectorAll('select.score-select');
     let allFilled = true;
     selects.forEach(sel => { if (!sel.value) allFilled = false; });
     if (allFilled) row.classList.add('scored');
     else row.classList.remove('scored');
   });
      const card = document.getElementById(`card-${c.name}`);
      if (card) { card.querySelector('.score').textContent = all ? Math.round(sum * 100) / 10 : '--'; if (all) filled += cfg.dimensions.length; }
    });

    const total = cfg.candidates.length * cfg.dimensions.length;
    const skip = document.getElementById('skipCandidates')?.checked || false;
    const btn = document.getElementById('submitBtn'), status = document.getElementById('status');
    if (skip || filled === total) {
      status.textContent = T('✅ 可以提交', '✅ Ready to submit.');
      btn.disabled = false;
      btn.textContent = T('✅ 提交评估', '✅ Submit Assessment');
    } else {
      status.textContent = T(`⚠️ 还有 ${total - filled} 个评分项未完成`, `⚠️ ${total - filled} scoring fields remaining.`);
      btn.disabled = true;
      btn.textContent = T('请完整填写所有评分项', 'Please complete all scoring fields');
    }
  }

  function submitSurvey(cfg) {
    const dept = document.getElementById('dept').value;
    if (!dept) return alert('请选择团队职能');
    const scores = {};
    const skip = document.getElementById('skipCandidates')?.checked || false;
    if (!skip) {
      cfg.candidates.forEach(c => {
        const s = {};
        cfg.dimensions.forEach(d => {
          const sel = document.querySelector(`select[data-candidate="${c.name}"][data-dimension="${d.name}"]`);
          s[d.name] = sel?.value || '';
        });
        let sum = 0; cfg.dimensions.forEach(d => sum += parseInt(s[d.name]) * (d.weight / 100));
        s.weighted = Math.round(sum * 100) / 10; scores[c.name] = s;
      });
    }
    const patterns = Array.from(document.querySelectorAll('#rulePatternSelect input:checked')).map(cb => cb.value);
    const digits = Array.from(document.querySelectorAll('#digitSelect input:checked')).map(cb => cb.value);
    const suffixes = Array.from(document.querySelectorAll('#suffixSelect input:checked')).map(cb => cb.value);
    const letters = Array.from(document.querySelectorAll('#letterSelect input:checked')).map(cb => cb.value);

    const templateParams = {
      projectId: cfg.projectId || '',
      department: dept, intuition: document.getElementById('intuition').value,
      custom_name: document.getElementById('customName').value, custom_reason: document.getElementById('customReason').value,
      navos_weighted: scores['Navos']?.weighted || '', cynos_weighted: scores['Cynos']?.weighted || '',
      toris_weighted: scores['Toris']?.weighted || '', navix_weighted: scores['Navix']?.weighted || '',
      lumis_weighted: scores['Lumis']?.weighted || '', rule_patterns: patterns.join(', '),
      digits: digits.join(', '), suffixes: suffixes.join(', '), letters: letters.join(', '),
      model_feedback: document.getElementById('modelFeedback').value, scores_json: JSON.stringify(scores)
    };

    // 发送到 EmailJS
    fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        service_id: EMAILJS_SERVICE_ID,
        template_id: EMAILJS_TEMPLATE_ID,
        user_id: EMAILJS_PUBLIC_KEY,
        template_params: templateParams
      })
    })
    .then(() => {
      showToast('提交成功！');
      // 同时发送到 Google Sheets
      return fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(templateParams)
      });
    })
    .catch(() => {
      fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(templateParams)
      });
      document.getElementById('fallbackBox').style.display = 'block';
    });
  }
  function copyFallback() { const ta = document.getElementById('fallbackData'); ta.select(); document.execCommand('copy'); showToast('已复制'); }
  function showToast(msg) { const t = document.getElementById('toast'); if (t) { t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); } }
</script>
</body>
</html>
